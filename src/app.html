<!doctype html>
<html lang="en">
		<head>
			<meta charset="utf-8" />
			<meta name="viewport" content="width=device-width, initial-scale=1" />
			<link rel="preconnect" href="https://fonts.googleapis.com">
			<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
			<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
			<script>
				(() => {
					const storedTheme = localStorage.getItem('tm-theme');
					const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
					const theme = storedTheme === 'light' || storedTheme === 'dark'
						? storedTheme
						: systemDark
							? 'dark'
							: 'light';
					document.documentElement.dataset.theme = theme;
				})();
			</script>
			%sveltekit.head%
		</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
